<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For my princess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .nav-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      width: 100%;
      max-width: 320px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 13px 20px;
      border: 1px solid rgba(180, 210, 255, 0.12);
      border-radius: 14px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.3s ease, background 0.3s ease, transform 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .nav-link:hover {
      border-color: rgba(180, 210, 255, 0.32);
      background: rgba(140, 180, 255, 0.05);
      transform: translateY(-2px);
    }

    .nav-link-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }

    .nav-link-label {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(160, 185, 230, 0.32);
    }

    .nav-link-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 17px;
      color: rgba(200, 220, 255, 0.75);
      letter-spacing: 0.03em;
    }

    .nav-link-arrow {
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: rgba(160, 185, 230, 0.22);
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .nav-link:hover .nav-link-arrow {
      color: rgba(180, 210, 255, 0.55);
      transform: translateX(3px);
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <canvas id="particles"></canvas>

  <!-- Intro screen -->
  <div id="intro">
    <div id="name-wrap">
      <span class="b-letter" data-i="0">B</span>
      <span class="b-letter" data-i="1">a</span>
      <span class="b-letter" data-i="2">n</span>
      <span class="b-letter" data-i="3">e</span>
      <span class="b-letter" data-i="4">e</span>
      <span class="b-letter" data-i="5">n</span>
    </div>
    <p id="tagline">my favourite person ♡</p>
    <p id="tap-hint">tap anywhere</p>
  </div>

  <!-- Main card -->
  <div class="scene" id="mainScene">
    <div class="card" id="card">
      <p class="title-name">Reasons why I love you, Baneen❤️</p>
      <div class="card-inner" id="cardInner">
        <p class="label" id="label"></p>
        <h2 class="reason" id="reason">Tap to begin</h2>
        <button class="btn" id="btn">begin</button>
      </div>
      <p class="since">since 26.03.2026</p>
      <p class="timer" id="timer"></p>
    </div>
    <p class="counter" id="counter"></p>

    <nav class="nav-links">
      <a href="typewriter.html" class="nav-link">
        <div class="nav-link-left">
          <span class="nav-link-label">for you</span>
          <span class="nav-link-title">a letter for you</span>
        </div>
        <span class="nav-link-arrow">→</span>
      </a>
      <a href="body.html" class="nav-link">
        <div class="nav-link-left">
          <span class="nav-link-label">appreciation</span>
          <span class="nav-link-title">every part of you</span>
        </div>
        <span class="nav-link-arrow">→</span>
      </a>
      <a href="dates.html" class="nav-link">
        <div class="nav-link-left">
          <span class="nav-link-label">memories</span>
          <span class="nav-link-title">our dates</span>
        </div>
        <span class="nav-link-arrow">→</span>
      </a>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
