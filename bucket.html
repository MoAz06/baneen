<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>our bucket list</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

<canvas id="sky"></canvas>

<div id="stage">
  <div id="top-bar">
    <div id="filters">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="todo">to do</button>
      <button class="filter-btn" data-filter="done">done</button>
    </div>
  </div>

  <p id="page-title">our bucket list</p>
  <p id="page-sub">all the little things we still want to do together</p>

  <button id="add-btn" onclick="openModal()">+ add a dream</button>

  <div id="loading-state"><p>loading our dreams...</p></div>
  <div id="bucket-grid"></div>
  <div id="empty-state">
    <p>nothing here yet...</p>
    <p class="hint">add the first thing you want to do together ♡</p>
  </div>

  <a href="index.html" id="back-link">← back</a>
</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <p id="modal-title">add to our bucket list</p>

    <div class="field">
      <label>title</label>
      <input type="text" id="inp-title" placeholder="e.g. watch the stars together" />
    </div>

    <div class="field">
      <label>category</label>
      <input type="text" id="inp-category" placeholder="e.g. travel, cozy, food..." />
    </div>

    <div class="field">
      <label>note</label>
      <textarea id="inp-note" placeholder="what makes this special..."></textarea>
    </div>

    <div id="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveItem()">save ♡</button>
    </div>
  </div>
</div>

<style>

<div id="login-screen">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc2BHnL7JKAi8N9HSjsWYV35e3YtWTjxU",
  authDomain: "baneen-2f47c.firebaseapp.com",
  projectId: "baneen-2f47c",
  storageBucket: "baneen-2f47c.firebasestorage.app",
  messagingSenderId: "955214840494",
  appId: "1:955214840494:web:9c41429a87943cb7ae633f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentFilter = 'all';
let editingId = null;
let allItems = [];

function usernameToEmail(username) {
  return `${username.trim().toLowerCase()}@bucket.local`;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function matchesFilter(item) {
  if (currentFilter === 'done') return !!item.done;
  if (currentFilter === 'todo') return !item.done;
  return true;
}

function setActiveFilterButton() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === currentFilter);
  });
}

async function loadItems() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('bucket-grid').innerHTML = '';

  try {
    const q = query(collection(db, 'bucketList'), orderBy('createdAt', 'desc'));
    const snapshot = await getDocs(q);
    allItems = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
    document.getElementById('loading-state').style.display = 'none';
    renderItems();
  } catch (err) {
    document.getElementById('loading-state').innerHTML = '<p style="color:rgba(255,140,140,0.45);font-size:12px;letter-spacing:0.1em;">could not load — not signed in or rules blocked</p>';
    console.error(err);
  }
}

function renderItems() {
  const grid = document.getElementById('bucket-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';
  setActiveFilterButton();

  const visibleItems = allItems.filter(matchesFilter);

  if (!visibleItems.length) {
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  visibleItems.forEach(item => {
    const card = document.createElement('div');
    card.className = `bucket-card ${item.done ? 'done' : ''}`;
    card.innerHTML = `
      <div class="bucket-top">
        <div class="bucket-title-wrap">
          <span class="bucket-heart">♡</span>
          <p class="bucket-title">${escapeHtml(item.title || 'untitled')}</p>
        </div>
        <input class="bucket-check" type="checkbox" ${item.done ? 'checked' : ''} />
      </div>
      ${item.category ? `<p class="bucket-category">${escapeHtml(item.category)}</p>` : ''}
      ${item.note ? `<p class="bucket-note">${escapeHtml(item.note)}</p>` : ''}
      <div class="bucket-meta">
        <p class="bucket-status">${item.done ? 'done ♡' : 'still to do'}</p>
        <div class="bucket-actions">
          <button class="bucket-action bucket-edit">edit</button>
          <button class="bucket-action bucket-delete">remove</button>
        </div>
      </div>
    `;

    card.querySelector('.bucket-check').addEventListener('change', async (e) => {
      try {
        await updateDoc(doc(db, 'bucketList', item.id), { done: e.target.checked });
        await loadItems();
      } catch (err) {
        console.error(err);
        alert('Could not update item.');
      }
    });

    card.querySelector('.bucket-edit').addEventListener('click', () => {
      editingId = item.id;
      document.getElementById('modal-title').textContent = 'edit bucket item';
      document.getElementById('inp-title').value = item.title || '';
      document.getElementById('inp-category').value = item.category || '';
      document.getElementById('inp-note').value = item.note || '';
      document.getElementById('save-btn').textContent = 'save ♡';
      document.getElementById('save-btn').disabled = false;
      document.getElementById('modal-overlay').classList.add('open');
    });

    card.querySelector('.bucket-delete').addEventListener('click', async () => {
      try {
        await deleteDoc(doc(db, 'bucketList', item.id));
        await loadItems();
      } catch (err) {
        console.error(err);
        alert('Could not remove item.');
      }
    });

    grid.appendChild(card);
  });
}

window.saveItem = async function() {
  const title = document.getElementById('inp-title').value.trim();
  const category = document.getElementById('inp-category').value.trim();
  const note = document.getElementById('inp-note').value.trim();

  if (!title) {
    document.getElementById('inp-title').focus();
    return;
  }

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'saving...';

  try {
    if (editingId) {
      await updateDoc(doc(db, 'bucketList', editingId), { title, category, note });
    } else {
      await addDoc(collection(db, 'bucketList'), {
        title,
        category,
        note,
        done: false,
        createdAt: Date.now()
      });
    }

    closeModal();
    await loadItems();
  } catch (err) {
    console.error(err);
    alert('Something went wrong: ' + err.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'save ♡';
  }
};

window.openModal = function() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'add to our bucket list';
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-category').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('save-btn').disabled = false;
  document.getElementById('save-btn').textContent = 'save ♡';
  document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal = function(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    editingId = null;
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('save-btn').disabled = false;
    document.getElementById('save-btn').textContent = 'save ♡';
  }
};

function ensureLogoutButton() {
  if (document.getElementById('logout-btn')) return;
  const btn = document.createElement('button');
  btn.id = 'logout-btn';
  btn.textContent = 'logout';
  btn.addEventListener('click', async () => {
    await signOut(auth);
  });
  document.body.appendChild(btn);
}

async function loginUser() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const error = document.getElementById('login-error');
  error.textContent = '';

  if (!username || !password) {
    error.textContent = 'fill in username and password';
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, usernameToEmail(username), password);
  } catch (err) {
    error.textContent = 'login failed';
    console.error(err);
  }
}

document.getElementById('login-btn').addEventListener('click', loginUser);

// FIX: Enter werkt nu op BEIDE velden
document.getElementById('login-username').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginUser();
});
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginUser();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    renderItems();
  });
});

onAuthStateChanged(auth, (user) => {
  const loginScreen = document.getElementById('login-screen');
  const stage = document.getElementById('stage');
  const logoutBtn = document.getElementById('logout-btn');

  if (user) {
    loginScreen.style.display = 'none';
    stage.style.visibility = 'visible';
    ensureLogoutButton();
    loadItems();
  } else {
    loginScreen.style.display = 'flex';
    stage.style.visibility = 'hidden';
    if (logoutBtn) logoutBtn.remove();
  }
});
</script>

<script>
// FIX: animId bijhouden zodat de loop gestopt kan worden bij resize
(function() {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let animId = null;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    const count = Math.floor(canvas.width * canvas.height / 7000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 0.9 + 0.2,
        a: Math.random() * 0.55 + 0.1,
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const grad = ctx.createRadialGradient(
      canvas.width * .5, canvas.height * .3, 0,
      canvas.width * .5, canvas.height * .3, canvas.width * .6
    );
    grad.addColorStop(0, 'rgba(20,35,72,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const s of stars) {
      const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    }

    t += 0.016;
    animId = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => {
    if (animId) cancelAnimationFrame(animId); // stop de oude loop
    resize();
    draw();
  });

  resize();
  draw();
})();
</script>
